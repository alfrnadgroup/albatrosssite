<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Albatross Voice Codec Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

/* HEADER WITH EXTRA LARGE LOGO */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
    background: #111827;
}

.header img {
    height: 144px;      /* 🔥 DOUBLE SIZE */
    width: auto;
}

.header span {
    font-size: 28px;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 12px;
}

h3 {
    margin-top: 0;
}

/* FORM ELEMENTS */
input, button, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

textarea {
    height: 120px;
    resize: none;
}

.status {
    margin-top: 10px;
    font-size: 13px;
    color: #93c5fd;
}

audio {
    width: 100%;
    margin-top: 10px;
}

/* MOBILE */
@media (max-width: 800px) {
    .container {
        grid-template-columns: 1fr;
    }

    .header {
        flex-direction: column;
        gap: 16px;
    }

    .header img {
        height: 176px;   /* even larger on mobile */
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" alt="Albatross Logo">
    <span>🔊 Albatross Voice Codec Dashboard</span>
</div>

<!-- CONTENT -->
<div class="container">

    <!-- ENCODE -->
    <div class="card">
        <h3>🎙 Encode Text → WAV</h3>

        <input id="encode_text" placeholder="Enter text (e.g. Ahmed Alfahdi)">
        <input id="encode_key" placeholder="Key (optional)">
        <button onclick="encode()">Encode & Download</button>

        <p class="status" id="encode_status"></p>

        <audio id="audio_player" controls></audio>
    </div>

    <!-- DECODE -->
    <div class="card">
        <h3>🔓 Decode WAV → Text</h3>

        <input type="file" id="file_input" accept=".wav">
        <input id="decode_key" placeholder="Key (optional)">
        <button onclick="decode()">Decode File</button>

        <p class="status" id="decode_status"></p>

        <textarea id="output" placeholder="Decoded text will appear here"></textarea>
    </div>

</div>

<script>
const BASE_URL = "https://albatrossvoice.onrender.com";

/* =========================
   ENCODE
========================= */
async function encode() {
    const text = document.getElementById("encode_text").value;
    const key = document.getElementById("encode_key").value;

    document.getElementById("encode_status").innerText = "Encoding...";

    try {
        const res = await fetch(BASE_URL + "/encode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                text: text,
                key: key ? parseInt(key) : null
            })
        });

        if (!res.ok) {
            document.getElementById("encode_status").innerText = "❌ Encode failed";
            return;
        }

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "output.wav";
        a.click();

        document.getElementById("audio_player").src = url;
        document.getElementById("encode_status").innerText = "✅ Done";

    } catch (err) {
        console.error(err);
        document.getElementById("encode_status").innerText = "❌ Server error";
    }
}

/* =========================
   DECODE
========================= */
async function decode() {
    const file = document.getElementById("file_input").files[0];
    const key = document.getElementById("decode_key").value;

    if (!file) {
        alert("Select WAV file first");
        return;
    }

    document.getElementById("decode_status").innerText = "Decoding...";

    try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("key", key);

        const res = await fetch(BASE_URL + "/decode", {
            method: "POST",
            body: formData
        });

        const text = await res.text();
        document.getElementById("output").value = text;
        document.getElementById("decode_status").innerText = "✅ Done";

    } catch (err) {
        console.error(err);
        document.getElementById("decode_status").innerText = "❌ Server error";
    }
}
</script>

</body>
</html>
